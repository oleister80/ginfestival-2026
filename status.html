<!doctype html>
<html lang="no">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#12372f">
    <title>Status terningkast | Fredrikstad Ginfestival 2026</title>
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css">
    <script src="status.js" defer></script>
  </head>
  <body class="stats-page">
    <main class="stats-main">
      <header class="stats-header">
        <p class="eyebrow">Fredrikstad Ginfestival 2026</p>
        <h1>Status terningkast</h1>
        <p>Produkter med minst én registrert stemme, sortert etter høyeste gjennomsnitt.</p>
      </header>

      <section aria-labelledby="stats-title">
        <div id="stats-devices" class="stats-devices" aria-live="polite"></div>
        <div class="stats-filters" aria-label="Filtrer produktstatistikk">
          <button class="filter is-active" type="button" data-stats-filter="all" aria-pressed="true">Alle</button>
          <button class="filter" type="button" data-stats-filter="gin" aria-pressed="false">Gin</button>
          <button class="filter" type="button" data-stats-filter="other" aria-pressed="false">Tonic / annet</button>
        </div>
        <div class="stats-summary">
          <h2 id="stats-title">Resultater</h2>
          <p id="stats-updated" aria-live="polite"></p>
        </div>
        <div id="stats-list" class="stats-list" aria-live="polite" aria-busy="true">
          <div class="status"><span class="loader" aria-hidden="true"></span><p>Laster statistikk …</p></div>
        </div>
      </section>
    </main>
  </body>
</html>
